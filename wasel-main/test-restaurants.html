<!DOCTYPE html>
<html dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>اختبار المطاعم والأصناف</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .restaurant { background: white; padding: 15px; margin: 10px 0; border-radius: 8px; }
    .restaurant h2 { color: #333; margin: 0 0 10px 0; }
    .restaurant-id { color: #666; font-size: 12px; }
    .menu-item { background: #f0f0f0; padding: 10px; margin: 5px 0; border-radius: 5px; }
    .menu-item-name { font-weight: bold; color: #222; }
    .menu-item-id { color: #999; font-size: 11px; }
    .no-items { color: #e74c3c; font-style: italic; }
    button { padding: 10px 20px; margin: 10px 0; background: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🍽️ اختبار البيانات من Base44</h1>
  <button onclick="loadData()">تحميل البيانات</button>
  <div id="result"></div>

  <script>
    const BASE44_APP_ID = '6956904186fea0685d192690';
    const BASE44_API_KEY = 'bf47b5bef33d46f8b2059e90f236f95d';

    async function loadData() {
      document.getElementById('result').innerHTML = '<p>⏳ جاري التحميل...</p>';
      
      try {
        // Fetch restaurants
        const restaurantsRes = await fetch(
          `https://app.base44.com/api/apps/${BASE44_APP_ID}/entities/Restaurant`,
          { headers: { 'api_key': BASE44_API_KEY } }
        );
        const restaurantsData = await restaurantsRes.json();
        const restaurants = restaurantsData.data || restaurantsData;

        // Fetch menu items
        const menuRes = await fetch(
          `https://app.base44.com/api/apps/${BASE44_APP_ID}/entities/MenuItem`,
          { headers: { 'api_key': BASE44_API_KEY } }
        );
        const menuData = await menuRes.json();
        const menuItems = menuData.data || menuData;

        // Display
        let html = `<h2>📊 الإحصائيات</h2>`;
        html += `<p>عدد المطاعم: ${restaurants.length}</p>`;
        html += `<p>عدد الأصناف: ${menuItems.length}</p>`;
        html += `<hr>`;

        restaurants.forEach(restaurant => {
          const restId = restaurant.id || restaurant._id;
          const relatedItems = menuItems.filter(item => 
            item.restaurant_id === restId || item.restaurant === restId
          );

          html += `<div class="restaurant">`;
          html += `<h2>${restaurant.name || restaurant.name_ar}</h2>`;
          html += `<div class="restaurant-id">ID: ${restId}</div>`;
          html += `<p>${restaurant.description || ''}</p>`;
          
          if (relatedItems.length > 0) {
            html += `<h3>🍴 الأصناف (${relatedItems.length})</h3>`;
            relatedItems.forEach(item => {
              html += `<div class="menu-item">`;
              html += `<div class="menu-item-name">${item.name || item.name_ar}</div>`;
              html += `<div class="menu-item-id">restaurant_id: ${item.restaurant_id || item.restaurant}</div>`;
              html += `</div>`;
            });
          } else {
            html += `<p class="no-items">⚠️ لا توجد أصناف لهذا المطعم</p>`;
          }
          
          html += `</div>`;
        });

        // Show orphan items
        const orphans = menuItems.filter(item => {
          const itemRestId = item.restaurant_id || item.restaurant;
          return !restaurants.some(r => (r.id || r._id) === itemRestId);
        });

        if (orphans.length > 0) {
          html += `<div class="restaurant" style="border: 2px solid #e74c3c;">`;
          html += `<h2>⚠️ أصناف بدون مطعم (${orphans.length})</h2>`;
          orphans.forEach(item => {
            html += `<div class="menu-item">`;
            html += `<div class="menu-item-name">${item.name || item.name_ar}</div>`;
            html += `<div class="menu-item-id">restaurant_id: ${item.restaurant_id || item.restaurant}</div>`;
            html += `</div>`;
          });
          html += `</div>`;
        }

        document.getElementById('result').innerHTML = html;
      } catch (error) {
        document.getElementById('result').innerHTML = `<p style="color: red;">❌ خطأ: ${error.message}</p>`;
      }
    }
  </script>
</body>
</html>
